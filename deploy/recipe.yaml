name: testsv Hard RP
version: v1.2.0
author: aosdev
description: Sadece resources gunceller. server.cfg ve MySQL'e DOKUNMAZ.

tasks:
  - action: download_github
    src: galaktik-yazilim/testsv-qbcore
    ref: main
    dest: ./tmp/repo

  - action: move_path
    src: ./tmp/repo/QBCore_2F0666.base/resources
    dest: ./resources
    overwrite: true

  - action: remove_path
    path: ./resources/[standalone]/oxmysql

  - action: remove_path
    path: ./resources/[standalone]/menuv

  - action: ensure_dir
    path: ./tmp/files

  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/download/v2.14.1/oxmysql.zip
    path: ./tmp/files/oxmysql.zip

  - action: unzip
    src: ./tmp/files/oxmysql.zip
    dest: ./resources/[standalone]

  - action: download_file
    url: https://github.com/ThymonA/menuv/releases/download/v1.4.1/menuv_v1.4.1.zip
    path: ./tmp/files/menuv.zip

  - action: unzip
    src: ./tmp/files/menuv.zip
    dest: ./resources/[standalone]/menuv

  - action: copy_path
    src: ./tmp/repo/QBCore_2F0666.base/myLogo.png
    dest: ./myLogo.png

  - action: remove_path
    path: ./tmp
