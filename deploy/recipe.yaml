name: testsv Hard RP — Güncelleme
version: v1.1.4
author: aosdev
description: GitHub kod güncelleme. Bozuk {{placeholder}} cfg satirlari duzeltilir. SQL yok.

tasks:
  - action: download_github
    src: galaktik-yazilim/testsv-qbcore
    ref: main
    dest: ./tmp/repo

  - action: move_path
    src: ./tmp/repo/QBCore_2F0666.base/resources
    dest: ./resources
    overwrite: true

  # Git'te dist/ yok — release zip (derlenmiş) kullan
  - action: remove_path
    path: ./resources/[standalone]/oxmysql

  - action: remove_path
    path: ./resources/[standalone]/menuv

  - action: ensure_dir
    path: ./tmp/files

  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/download/v2.14.1/oxmysql.zip
    path: ./tmp/files/oxmysql.zip

  - action: unzip
    src: ./tmp/files/oxmysql.zip
    dest: ./resources/[standalone]

  - action: download_file
    url: https://github.com/ThymonA/menuv/releases/download/v1.4.1/menuv_v1.4.1.zip
    path: ./tmp/files/menuv.zip

  - action: unzip
    src: ./tmp/files/menuv.zip
    dest: ./resources/[standalone]/menuv

  - action: copy_path
    src: ./tmp/repo/QBCore_2F0666.base/myLogo.png
    dest: ./myLogo.png

  # server.cfg: sadece yoksa Zap sablonu kopyala (MySQL/license dahil)
  - action: copy_path
    src: ./tmp/repo/deploy/server.cfg.template
    dest: ./server.cfg
    overwrite: false
    errorOnExist: false

  - action: replace_string
    mode: literal
    file: ./server.cfg
    search: '{{dbConnectionString}}'
    replace: 'mysql://zap1391637-1:8GApJsPYjZWSc5WO@mysql-mariadb-21-104.zap-srv.com:3306/zap1391637-1?charset=utf8mb4'

  - action: remove_path
    path: ./tmp
