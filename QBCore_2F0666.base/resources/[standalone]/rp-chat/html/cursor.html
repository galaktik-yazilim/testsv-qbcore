<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: transparent;
                overflow: hidden;
            }
        </style>
    </head>
    <body tabindex="0">
        <script>
            function isF4Key(event) {
                return (
                    event.key === "F4" ||
                    event.code === "F4" ||
                    event.keyCode === 115
                );
            }

            function isEscapeKey(event) {
                return event.key === "Escape" || event.keyCode === 27;
            }

            function postAction(action) {
                fetch("https://" + GetParentResourceName() + "/" + action, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: "{}",
                });
            }

            window.addEventListener(
                "keydown",
                function (event) {
                    if (isF4Key(event)) {
                        event.preventDefault();
                        event.stopPropagation();
                        postAction("toggleMouse");
                        return;
                    }
                    if (isEscapeKey(event)) {
                        event.preventDefault();
                        event.stopPropagation();
                        postAction("closeCursor");
                    }
                },
                true
            );

            document.body.focus();
        </script>
    </body>
</html>
