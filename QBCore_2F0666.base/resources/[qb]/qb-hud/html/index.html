<html>
    <head>
        <meta id="viewport" name="viewport" content ="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" type="text/css" href="styles.css"/>
        <link rel="stylesheet" type="text/css" href="responsive.css"/>
        <link href="https://cdn.jsdelivr.net/npm/quasar@2.1.0/dist/quasar.prod.css" rel="stylesheet" type="text/css"/>
        <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.13.0/css/all.css"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/quasar@2.1.0/dist/quasar.umd.prod.js" defer></script>
        <script src="app.js" defer></script>
    </head>
    <body>
        <div id="baseplate-container" v-show="show">
            <div v-if="showStreets" class="street-container">
                <div class="street2">{{street2}}</div>
                <div class="street1">{{street1}}</div>
            </div>
            <div class="baseplate" v-show="show">
                <div v-if="showPointer" class="pointer">˅</div>
                <div v-if="showDegrees" class="degrees"></div>
                    <svg class="bezel">
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="-90"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="-45"/>
                        <rect width="4.5" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="0"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="45"/>
                        <rect width="4.5" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="90"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="135"/>
                        <rect width="4.5" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="180"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="225"/>
                        <rect width="4.5" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="270"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="315"/>
                        <rect width="4.5" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="360"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="9" x="405"/>
                        <rect width="3" stroke="black" fill="white" stroke-width="0.5" stroke-opacity="0.6" v-if="showCompass" height="20" x="450"/>
                    </svg>

                    <svg class="bearing">
                        <text v-if="showCompass" x="0" y="1.5" dominant-baseline="middle" text-anchor="middle" fill= "yellow">N</text>
                        <text v-if="showCompass" x="360" y="1.5" dominant-baseline="middle" text-anchor="middle" fill= "yellow">N</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="315" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">NW</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="-45" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">NW</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="45" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">NE</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="405" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">NE</text>
                        <text v-if="showCompass" x="90" y="1.5" dominant-baseline="middle" text-anchor="middle" fill="white">E</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="135" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">SE</text>
                        <text v-if="showCompass" x="180" y="1.5" dominant-baseline="middle" text-anchor="middle" fill="white">S</text>
                        <text style="font-size: 1.4vh!important; font-weight: 800!important;" v-if="showCompass" x="225" y="-11" dominant-baseline="middle" text-anchor="middle" fill="white">SW</text>
                        <text v-if="showCompass" x="270" y="1.5" dominant-baseline="middle" text-anchor="middle" fill="white">W</text>
                    </svg>
                </div>
            </div>
        <div id="openmenu">
            <div id="menu">
                <q-splitter v-model="splitterModel" style="height: 50vh;">
                    <template v-slot:before>
                        <q-tabs v-model="tab" active-bg-color="active-tab" inline-label indicator-color="transparent" vertical class="text-tabcolor bg-panel">
                            <q-tab name="hud" icon="view_list" label="HUD" style="height: 5.5vh; padding-left: 1vh; justify-content: end;"></q-tab>
                        </q-tabs>
                    </template>
                    <template v-slot:after>
                        <q-tab-panels v-model="tab" animated swipeable vertical transition-prev="jump-up" transition-next="jump-up" class="bg-active-tab">
                            <q-tab-panel name="hud">
                                <div class="q-mb-md">
                                    <div class="text-h6 q-mb-md">HUD Sıfırla <img class="brand-logo" align="right" src="./brand-logo.svg"></img></div>
                                    <div class="q-pa-md q-gutter-sm">
                                        <q-btn v-on:click="resetStorage($event)" :loading="progress[0].loading" :percentage="progress[0].percentage" text-color="textbutton" color="bgbutton" @click="startComputing(0)" style="width: 150px"> Ayarları Sıfırla
                                        <template v-slot:loading> <q-spinner-gears class="on-left"></q-spinner-gears> Sıfırlanıyor... </template></q-btn>
                                        <div class="text-h7 q-mb-md">Ayarları varsayılana döndürmek için bu düğmeye tıklayın.<br> (değişiklikler için relog gerekebilir)</div>
                                        <q-btn v-on:click="restartHud($event)" :loading="progress[1].loading" :percentage="progress[1].percentage" text-color="textbutton" color="bgbutton" @click="startComputing(1)" style="width: 150px"> HUD Sıfırla
                                        <template v-slot:loading> <q-spinner-gears class="on-left"></q-spinner-gears> Sıfırlanıyor... </template></q-btn>
                                        <div class="text-h7 q-mb-md">HUD bozulduysa sıfırlayın veya /resethud kullanın</div>
                                    </div>
                                    <hr>
                                    <div class="text-h6 q-mb-md">Seçenekler</div>
                                    <div class="text-h7">
                                        <q-item borderless tag="label" v-ripple>
                                            <q-item-section avatar>
                                                <q-checkbox v-model="isOutMapChecked" v-on:click="showOutMap($event)" color="checkbox" val="1"></q-checkbox>
                                            </q-item-section>
                                            <q-item-section>
                                                <q-item-label>Minimap yalnızca araçtayken</q-item-label>
                                                <q-item-label class="text-h7" caption>Kapalıyken minimap her zaman ekranda kalır</q-item-label>
                                            </q-item-section>
                                        </q-item>
                                        <q-item borderless tag="label" v-ripple>
                                            <q-item-section avatar>
                                                <q-checkbox v-model="isOutCompassChecked" v-on:click="showOutCompass($event)" color="checkbox" val="2"></q-checkbox>
                                            </q-item-section>
                                            <q-item-section>
                                                <q-item-label>Pusula yalnızca araçtayken</q-item-label>
                                                <q-item-label class="text-h7" caption>Kapalıyken pusula her zaman ekranda kalır</q-item-label>
                                            </q-item-section>
                                        </q-item>
                                        <q-item borderless tag="label" v-ripple>
                                            <q-item-section avatar>
                                                <q-checkbox v-model="isCompassFollowChecked" v-on:click="showFollowCompass($event)" color="checkbox" val="3"></q-checkbox>
                                            </q-item-section>
                                            <q-item-section>
                                                <q-item-label>Pusula kamerayı takip etsin</q-item-label>
                                                <q-item-label class="text-h7" caption>Kapalıyken fare ile pusulayı döndüremezsiniz</q-item-label>
                                            </q-item-section>
                                        </q-item>
                                    </div>
                                    <hr>
                                    <div class="text-h6 q-mb-md">Bildirimler</div>
                                    <div class="text-h7">
                                        <q-checkbox v-on:click="openMenuSounds($event)" label='Menü ses efektleri' v-model="isOpenMenuSoundsChecked" color="checkbox" val="4" style="display: flex;"></q-checkbox>
                                        <q-checkbox v-on:click="resetHudSounds($event)" label='HUD sıfırlama sesleri' v-model="isResetSoundsChecked" color="checkbox" val="5" style="display: flex;"></q-checkbox>
                                        <q-checkbox v-on:click="checklistSounds($event)" label='Arayüz ses efektleri' v-model="isListSoundsChecked" color="checkbox" val="6" style="display: flex;"></q-checkbox>
                                        <q-checkbox v-on:click="showMapNotif($event)" label='Harita bildirimleri' v-model="isMapNotifChecked" color="checkbox" val="7" style="display: flex;"></q-checkbox>
                                        <q-checkbox v-on:click="showFuelAlert($event)" label='Düşük yakıt uyarısı' v-model="isLowFuelChecked" color="checkbox" val="8" style="display: flex;"></q-checkbox>
                                        <q-checkbox v-on:click="showCinematicNotif($event)" label='Sinematik mod bildirimleri' v-model="isCinematicNotifChecked" color="checkbox" val="9" style="display: flex;"></q-checkbox>
                                    </div>
                                </div>
                                <hr>
                                <div class="text-h6 q-mb-md">Durum</div>
                                <div class="text-h7">
                                    <q-checkbox v-on:click="dynamicHealth($event)" label='Can her zaman görünsün' v-model="isDynamicHealthChecked" color="checkbox" val="10" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="dynamicArmor($event)" label='Zırh her zaman görünsün' v-model="isDynamicArmorChecked" color="checkbox" val="11" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="dynamicHunger($event)" label='Açlık her zaman görünsün' v-model="isDynamicHungerChecked" color="checkbox" val="12" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="dynamicThirst($event)" label='Susuzluk her zaman görünsün' v-model="isDynamicThirstChecked" color="checkbox" val="13" style="display: flex;"></q-checkbox>
                                </div>
                                <hr>
                                <div class="text-h6 q-mb-md">Araç</div>
                                <div class="text-h7">
                                    <q-toggle v-on:click="changeFPS($event)" size="lg" keep-color icon-color="toggleicons" color="checkbox" :label="`Hız göstergesi FPS ${isChangeFPSChecked}`" unchecked-icon="60fps" false-value="Synced" true-value="Optimized" checked-icon="30fps" v-model="isChangeFPSChecked"></q-toggle>
                                    <div class="text-h7 q-mb-md-d">Senkron FPS daha az optimize ama gerçek zamanlı hız gösterir; makineye daha yük bindirir.</div>
                                    <q-toggle v-on:click="ToggleMapShape($event)" size="lg" keep-color icon-color="toggleicons" color="checkbox" :label="`Minimap ${isToggleMapShapeChecked}`" unchecked-icon="radio_button_unchecked" false-value="circle" true-value="square" checked-icon="check_box_outline_blank" v-model="isToggleMapShapeChecked"></q-toggle>
                                    <div class="text-h7 q-mb-md-d">Minimap şeklini kare veya daire olarak seçebilirsiniz.</div>
                                    <q-checkbox v-on:click="HideMap($event)" label='Minimap açık' v-model="isHideMapChecked" color="checkbox" val="15" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="ToggleMapBorders($event)" label='Minimap kenarlıkları' v-model="isToggleMapBordersChecked" color="checkbox" val="16" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="dynamicEngine($event)" label='Motor her zaman görünsün' v-model="isDynamicEngineChecked" color="checkbox" val="17" style="display: flex;"></q-checkbox>
                                    <q-checkbox v-on:click="dynamicNitro($event)" label='Nitro her zaman görünsün' v-model="isDynamicNitroChecked" color="checkbox" val="18" style="display: flex;"></q-checkbox>
                                </div>
                                <hr>
                                <div class="text-h6 q-mb-md">Pusula</div>
                                <div class="text-h7">
                                    <q-toggle v-on:click="changeCompassFPS($event)" size="lg" keep-color icon-color="toggleicons" color="checkbox" :label="`Pusula FPS ${isChangeCompassFPSChecked}`" unchecked-icon="60fps" false-value="Synced" true-value="Optimized" checked-icon="30fps" v-model="isChangeCompassFPSChecked"></q-toggle>
                                    <div class="text-h7 q-mb-md-d">Senkron FPS pusulayı gerçek zamanlı tutar; daha yüksek kaynak kullanır.</div>
                                    <q-item borderless tag="label" v-ripple>
                                        <q-item-section avatar>
                                            <q-checkbox v-on:click="showCompassBase($event)" v-model="isShowCompassChecked" color="checkbox" val="19"></q-checkbox>
                                        </q-item-section>
                                        <q-item-section >
                                            <q-item-label>Pusula açık</q-item-label>
                                            <q-item-label class="text-h7" caption>Kapalıyken pusula navigasyonu görünmez</q-item-label>
                                        </q-item-section>
                                    </q-item>
                                    <q-item borderless tag="label" v-ripple>
                                        <q-item-section avatar>
                                            <q-checkbox v-on:click="showStreetsNames($event)" v-model="isShowStreetsChecked" color="checkbox" val="20"></q-checkbox>
                                        </q-item-section>
                                        <q-item-section>
                                            <q-item-label>Sokak adları</q-item-label>
                                            <q-item-label class="text-h7" caption>Kapalıyken sokak / konum adları görünmez</q-item-label>
                                        </q-item-section>
                                    </q-item>
                                    <q-item borderless tag="label" v-ripple>
                                        <q-item-section avatar>
                                            <q-checkbox v-on:click="showPointerIndex($event)" v-model="isPointerShowChecked" color="checkbox" val="21"></q-checkbox>
                                        </q-item-section>
                                        <q-item-section>
                                            <q-item-label>Pusula işaretçisi</q-item-label>
                                            <q-item-label class="text-h7" caption>Kapalıyken yön işaretçisi görünmez</q-item-label>
                                        </q-item-section>
                                    </q-item>
                                    <q-item borderless tag="label" v-ripple>
                                        <q-item-section avatar>
                                            <q-checkbox v-on:click="showDegreesNum($event)" v-model="isDegreesShowChecked" color="checkbox" val="22"></q-checkbox>
                                        </q-item-section>
                                        <q-item-section>
                                            <q-item-label>Pusula derecesi</q-item-label>
                                            <q-item-label class="text-h7" caption>Kapalıyken derece değeri görünmez</q-item-label>
                                        </q-item-section>
                                    </q-item>
                                </div>
                                <hr>
                                <div class="text-h6 q-mb-md">Sinematik Mod</div>
                                <div class="text-h7">
                                    <q-checkbox v-on:click="cinematicMode($event)" label='Açık' v-model="isCinematicModeChecked" color="checkbox" val="23" style="display: flex;"></q-checkbox>
                                </div>
                                <br>
                            </q-tab-panel>
                        </q-tab-panels>
                    </template>
                </q-splitter>
            </div>
        </div>
        <div id="main-container">
            <div id="money-container">
                <div id="money-cash">
                    <transition name="slide-fade">
                        <p v-if="showCash"><span id="sign">$&nbsp;</span><span id="money">{{(cash)}}</span></p>
                    </transition>
                </div>
                <div id="money-bank">
                    <transition name="slide-fade">
                        <p v-if="showBank"><span id="sign">$&nbsp;</span><span id="bank">{{(bank)}}</span></p>
                    </transition>
                </div>
                <div id="money-change" v-if="showUpdate">
                    <p v-if="plus" id="money"><span id="plus">+&nbsp;</span><span id="money">{{(amount)}}</span></p>
                    <p v-else-if="minus" id="minus"><span id="minus">-&nbsp;</span><span id="money">{{(amount)}}</span></p>
                </div>
            </div>
            <div id="ui-container">
                <div id="playerHud" v-show="show">
                    <transition name="fade">
                    <div class="stat-box" v-if="showVoice" :style="{ '--stat-pct': (voice / 5 * 100) + '%', '--stat-color': talkingColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" :name="voiceIcon" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showHealth" :style="{ '--stat-pct': health + '%', '--stat-color': healthColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-heart" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showArmor" :style="{ '--stat-pct': armor + '%', '--stat-color': armorColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-shield-alt" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showHunger" :style="{ '--stat-pct': hunger + '%', '--stat-color': hungerColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-hamburger" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showThirst" :style="{ '--stat-pct': thirst + '%', '--stat-color': thirstColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-tint" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showArmed" :style="{ '--stat-pct': '100%', '--stat-color': '#ff4885' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-stream" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showParachute" :style="{ '--stat-pct': (parachute / 2 * 100) + '%', '--stat-color': '#9e9e9e' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-parachute-box" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showEngine" :style="{ '--stat-pct': engine + '%', '--stat-color': engineColor }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-oil-can" :style="{ color: '#ffffff' }"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showHarness" :style="{ '--stat-pct': (hp > 100 ? 100 : hp) + '%', '--stat-color': '#b648ff' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-user-slash" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showCruise" :style="{ '--stat-pct': speed + '%', '--stat-color': '#ff4885' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-tachometer-alt-fast" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showNos" :style="{ '--stat-pct': nos + '%', '--stat-color': nosColor || '#ff4885' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-meteor" color="white"/>
                    </div>
                    </transition>
                    <transition name="fade">
                    <div class="stat-box" v-if="showDev" :style="{ '--stat-pct': '100%', '--stat-color': '#616161' }">
                        <div class="stat-box-track"></div>
                        <div class="stat-box-fill"></div>
                        <q-icon class="stat-box-icon" name="fas fa-terminal" color="white"/>
                    </div>
                    </transition>
                    <div id="money-cash-ragemp" v-if="show">
                        <span class="cash-sign">$</span>{{ cashAmount.toLocaleString('en-US') }}
                    </div>
                </div>
                <div id="ragemp-info" v-show="showInfo">
                    <div class="info-bar">
                        <template v-if="inVehicle">
                            <div class="info-vehicle">
                                <i class="fas fa-tachometer-alt info-icon"></i>
                                <span class="info-speed">{{ speedText }}</span>
                                <i class="fas fa-gas-pump info-icon"></i>
                                <div class="fuel-bar"><div class="fuel-fill" :style="{ width: vehicleFuel + '%' }"></div></div>
                                <i class="fas fa-road info-icon"></i>
                                <span class="info-mileage">{{ mileageText }}</span>
                            </div>
                            <span class="info-sep">|</span>
                        </template>
                        <span class="info-id">ID</span>
                        <span class="info-name">{{ charName }} ({{ serverId }})</span>
                        <span class="info-sep">|</span>
                        <i class="fas fa-calendar-alt info-icon"></i>
                        <span class="info-datetime">{{ dateTime }}</span>
                        <span class="info-sep">|</span>
                        <i class="fas fa-map-marker-alt info-icon"></i>
                        <span class="info-zone">{{ zone }}</span>
                    </div>
                </div>
            </div>
            <div id="veh-container">
                <div class="border">
                    <div class="square" v-if="showSquare"></div>
                </div>
                <div class="border">
                    <div class="circle" v-if="showCircle"></div>
                </div>
            </div>
        </div>
    </body>
</html>
